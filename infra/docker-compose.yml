services:
  db:
    build:
      context: ..
      dockerfile: infra/db/Dockerfile
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    # Docker default shm_size is 64MB; PostgreSQL needs at least shared_buffers
    # worth of /dev/shm for its shared memory segments.
    shm_size: "1g"
    # Tuned for bulk pipeline loads. Default max_locks_per_transaction=64
    # causes OOM during large state ingests (TX ~500K rows, WI ~100K rows).
    # TX alone needs ~500K row-level locks in a single transaction.
    command:
      - "postgres"
      - "-c"
      - "max_locks_per_transaction=2048"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "work_mem=32MB"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-civibus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-civibus}
      POSTGRES_PORT: ${POSTGRES_PORT:-5433}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - civibus_db_data:/var/lib/postgresql/data
      - ../core/schema/entities.sql:/docker-entrypoint-initdb.d/01-entities.sql
      - ../core/schema/migrations/2026_04_30_person_bio_fields.sql:/docker-entrypoint-initdb.d/02-person-bio-fields.sql
      - ../core/schema/jurisdiction.sql:/docker-entrypoint-initdb.d/03-jurisdiction.sql
      - ../core/schema/provenance.sql:/docker-entrypoint-initdb.d/04-provenance.sql
      - ../core/schema/entity_resolution.sql:/docker-entrypoint-initdb.d/05-entity_resolution.sql
      - ../core/schema/er_views.sql:/docker-entrypoint-initdb.d/06-er_views.sql
      - ../domains/campaign_finance/schema/tables.sql:/docker-entrypoint-initdb.d/07-campaign-finance.sql
      - ../domains/campaign_finance/schema/nc_orchestrator_tables.sql:/docker-entrypoint-initdb.d/08-nc-orchestrator.sql
      - ../domains/campaign_finance/schema/dark_money_tables.sql:/docker-entrypoint-initdb.d/09-dark-money.sql
      - ../domains/property/schema/tables.sql:/docker-entrypoint-initdb.d/10-property.sql
      - ../domains/civics/schema/tables.sql:/docker-entrypoint-initdb.d/11-civics.sql
      - ../infra/db/09-age-graph-bootstrap.sql:/docker-entrypoint-initdb.d/12-age-graph-bootstrap.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  civibus_db_data:
