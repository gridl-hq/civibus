# Production compose — SELF-CONTAINED. No overlays, no overrides.
#
# This is the only compose file the production VM should run.
# `docker compose up` from this directory either produces a correct prod
# stack or refuses to start. There is no ambiguity, no flag-required
# wrapper script.
#
# Apr 30 incident: a `docker compose up` from infra/ loaded the dev
# compose (named volume, port 5433) and force-recreated infra-db-1
# against a fresh volume, severing the prod data link for 16 hours.
# Removing the overlay file `docker-compose.volume-override.yml` and
# baking the bind mount into the prod file directly is the structural
# fix.
#
# Bind mount path is required (`?Set CIVIBUS_DB_DATA_PATH`) so a
# fat-fingered env file fails the stack at start time instead of
# silently bootstrapping a fresh named volume.
services:
  db:
    build:
      context: ..
      dockerfile: infra/db/Dockerfile
    ports:
      - "127.0.0.1:5432:5432"
    # Docker default shm_size is 64MB; PostgreSQL needs at least shared_buffers
    # worth of /dev/shm for its shared memory segments.
    shm_size: "1g"
    # Tuned for bulk pipeline loads from host. Default max_locks_per_transaction=64
    # causes OOM during large state ingests (TX ~500K rows, WI ~100K rows).
    # TX alone needs ~500K row-level locks in a single transaction.
    command:
      - "postgres"
      - "-c"
      - "max_locks_per_transaction=2048"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "work_mem=32MB"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-civibus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-civibus}
      PGDATA: /var/lib/postgresql/data
    volumes:
      # Bind mount to the dedicated data volume. Required env var: any
      # missing/typoed value fails compose immediately rather than
      # silently provisioning a fresh empty volume.
      - ${CIVIBUS_DB_DATA_PATH:?Set CIVIBUS_DB_DATA_PATH (e.g. /mnt/HC_Volume_105390322/pgdata)}:/var/lib/postgresql/data
      # Schema init scripts: single source of truth for table-creation
      # ordering. Postgres only runs these against an EMPTY data dir
      # (first-boot only), so reordering is safe in practice but should
      # mirror the dev compose's list.
      - ../core/schema/entities.sql:/docker-entrypoint-initdb.d/01-entities.sql
      - ../core/schema/jurisdiction.sql:/docker-entrypoint-initdb.d/02-jurisdiction.sql
      - ../core/schema/provenance.sql:/docker-entrypoint-initdb.d/03-provenance.sql
      - ../core/schema/entity_resolution.sql:/docker-entrypoint-initdb.d/04-entity_resolution.sql
      - ../core/schema/er_views.sql:/docker-entrypoint-initdb.d/05-er_views.sql
      - ../domains/campaign_finance/schema/tables.sql:/docker-entrypoint-initdb.d/06-campaign-finance.sql
      - ../domains/campaign_finance/schema/nc_orchestrator_tables.sql:/docker-entrypoint-initdb.d/07-nc-orchestrator.sql
      - ../domains/campaign_finance/schema/dark_money_tables.sql:/docker-entrypoint-initdb.d/08-dark-money.sql
      - ../domains/property/schema/tables.sql:/docker-entrypoint-initdb.d/09-property.sql
      - ../domains/civics/schema/tables.sql:/docker-entrypoint-initdb.d/10-civics.sql
      - ../infra/db/09-age-graph-bootstrap.sql:/docker-entrypoint-initdb.d/11-age-graph-bootstrap.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - civibus

  api:
    build:
      context: ..
      dockerfile: infra/api/Dockerfile
    image: "ghcr.io/gridl-dev/civibus_dev/api:${IMAGE_TAG:-latest}"
    environment:
      CIVIBUS_ENV: production
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-civibus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-civibus}
      CIVIBUS_CORS_ORIGIN: ${ORIGIN:?Set ORIGIN}
      CIVIBUS_API_KEYS: ${CIVIBUS_API_KEYS:?Set CIVIBUS_API_KEYS}
      CIVIBUS_ADMIN_API_KEYS: ${CIVIBUS_ADMIN_API_KEYS:?Set CIVIBUS_ADMIN_API_KEYS}
      CIVIBUS_RATE_LIMIT_REQUESTS: ${CIVIBUS_RATE_LIMIT_REQUESTS:-100}
      CIVIBUS_RATE_LIMIT_WINDOW_SECONDS: ${CIVIBUS_RATE_LIMIT_WINDOW_SECONDS:-60}
      # Startup canary floors. Defaults in api/health_content.py are
      # prod-sized; override here only when promoting a smaller-than-prod
      # snapshot (and never to zero).
      CIVIBUS_HEALTH_CONTENT_FLOOR_CF_TRANSACTION_TOTAL: ${CIVIBUS_HEALTH_CONTENT_FLOOR_CF_TRANSACTION_TOTAL:-1000000}
      CIVIBUS_HEALTH_CONTENT_FLOOR_CORE_PERSON_TOTAL: ${CIVIBUS_HEALTH_CONTENT_FLOOR_CORE_PERSON_TOTAL:-1000}
      CIVIBUS_HEALTH_CONTENT_FLOOR_CIVIC_OFFICEHOLDING_TOTAL: ${CIVIBUS_HEALTH_CONTENT_FLOOR_CIVIC_OFFICEHOLDING_TOTAL:-100}
      CIVIBUS_HEALTH_CONTENT_FLOOR_CF_TRANSACTION_WITH_RESOLVED_PERSON: ${CIVIBUS_HEALTH_CONTENT_FLOOR_CF_TRANSACTION_WITH_RESOLVED_PERSON:-1000}
    healthcheck:
      # Use the content-aware probe so the API container is only marked
      # healthy when the DB actually contains data above floors. This
      # prevents Caddy from routing traffic to an empty DB after a
      # wrong-volume bootstrap.
      test: ["CMD-SHELL", "python3 -c \"import urllib.request, sys; r = urllib.request.urlopen('http://localhost:8000/api/health/content', timeout=5); sys.exit(0 if r.status == 200 else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      # Long start_period because the canary itself does a DB query at
      # boot; a slow DB or migration replay must not flap the gate.
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy
    networks:
      - civibus

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    image: "ghcr.io/gridl-dev/civibus_dev/web:${IMAGE_TAG:-latest}"
    environment:
      CIVIBUS_API_BASE_URL: http://api:8000
      CIVIBUS_API_KEY: ${CIVIBUS_API_KEY:?Set CIVIBUS_API_KEY}
      ORIGIN: ${ORIGIN:?Set ORIGIN}
      PUBLIC_ORIGIN: ${ORIGIN:?Set ORIGIN}
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    networks:
      - civibus

  caddy:
    image: caddy:2
    environment:
      PUBLIC_HOSTNAME: ${PUBLIC_HOSTNAME:?Set PUBLIC_HOSTNAME}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../infra/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - web
    networks:
      - civibus

# No named volumes section: the DB is bind-mounted to the path supplied
# by CIVIBUS_DB_DATA_PATH. A future loose `docker compose up` against a
# missing env var fails fast instead of bootstrapping a fresh anonymous
# volume.

networks:
  civibus:
    driver: bridge
