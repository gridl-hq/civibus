    entity_type: person
    left_entity:
      canonical_name: Julia C. Howard
      jurisdiction: state/nc
      source_record_key: ncga-house-h53
    right_entity:
      canonical_name: Mitchell S. Setzer
      jurisdiction: state/nc
      source_record_key: ncga-house-h149
    rationale: Distinct NC House members in different districts must never auto-merge despite shared office scope.
    source_notes:
      - tests/fixtures/roster/nc_general_assembly_house.html
      - docs/reference/research/artifacts/2026_04_29_roster_pilot_closeout/nc_house_counts_after_rerun.txt
  - case_id: organization_similar_name_distinct_committees
