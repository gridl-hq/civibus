laws:
  source_url: "https://www.ethics.state.tx.us/laws/election-code/"
  last_verified: "2026-03-21"
  contribution_limits:
    individual_to_candidate: "unlimited"
    pac_to_candidate: "unlimited"
    corporate_direct: "prohibited"
    union_direct: "prohibited"
    party_to_candidate: "unlimited"
  itemization_threshold: 110 # lowest current TEC-adjusted Chapter 254 threshold; expenditure itemization rises to $230
  reporting:
    periods: ["semi-annual", "pre-election", "runoff"]
    electronic_filing_required: "required"
  public_financing: false
  notes:
    - "Texas has no contribution limits for individuals or PACs to candidates; only corporate and union direct contributions are prohibited (TX Election Code Title 15, Chapter 253)"
    - "Texas uses multiple TEC-adjusted Chapter 254 thresholds effective January 1, 2026; this config keeps the lowest current threshold ($110) for contributions and loans, while expenditure itemization rises to $230"
    - "Most TEC filers must file electronically unless they qualify for a statutory exemption tied to recordkeeping method and the current calendar-year ceiling for contributions and expenditures ($34,890 effective January 1, 2026)"
    - "TEC bulk archive includes both state and local campaign finance filings"

