laws:
  source_url: "https://codes.ohio.gov/ohio-revised-code/chapter-3517"
  last_verified: "2026-03-22"
  contribution_limits:
    individual_to_candidate: 16616
    pac_to_candidate: 16616
    corporate_direct: "prohibited"
    union_direct: "prohibited"
    party_to_candidate: 93048
  itemization_threshold: 50
  reporting:
    periods: ["semiannual", "annual", "pre-election", "post-election"]
    electronic_filing_required: "required"
  public_financing: false
  notes:
    - "ORC §3517.102 base limits are $10,000 per election period; ORC §3517.104 requires CPI adjustment every odd year — current adjusted limits effective 2025-02-25 through 2027-02-24 are $16,615.67 (rounded to $16,616)"
    - "Corporate and union direct contributions to candidates are prohibited per ORC §3599.03; they may form PACs and may contribute up to $10,000 per calendar year to a state political party restricted fund per ORC §3517.102(X)(3)(a)"
    - "Party-to-candidate limits (CPI-adjusted) vary by office: $937,124 statewide, $186,926 senate, $93,048 house per election period; config uses $93,048 (lowest tier)"
    - "ORC §3517.10(B)(4)(e) allows limited aggregation for contributions of $50 or less received at one social or fund-raising activity and payroll-deduction contributions of $50 or less per calendar year; ORC §3517.104 adjusts those amounts every odd year, and the 2025 SOS booklet shows the parallel in-kind social/fund-raising threshold at $425"
    - "Contributions exceeding $100 require disclosure of donor's employer and occupation per ORC §3517.10"
    - "ORC §3517.106 mandates electronic filing for statewide, General Assembly, appeals court, PAC, and party committees exceeding $10,000 in contributions or expenditures; only local candidates below threshold are exempt"

