laws:
  source_url: "https://www.ilga.gov/Documents/legislation/ilcs/documents/001000050K9-8.5.htm"
  last_verified: "2026-03-27"
  contribution_limits:
    individual_to_candidate: 6900
    pac_to_candidate: 68500
    corporate_direct: 13700
    union_direct: 13700
    party_to_candidate: "unlimited"
  itemization_threshold: 150
  reporting:
    periods: ["quarterly", "A-1", "B-1", "statement-of-organization"]
    electronic_filing_required: "not_required"
  public_financing: false
  notes:
    - "Base campaign-finance duties are in 10 ILCS 5/9-3, 9-10, 9-11, and contribution limits are in 10 ILCS 5/9-8.5."
    - "Current per-cycle limit values above are taken from Appendix A, Table A of 26 Ill. Adm. Code part 100 as mirrored by Cornell LII on 2026-03-27."
    - "Political party committees are generally unlimited, but Appendix A imposes office-specific caps during a primary-cycle nomination contest."
    - "Quarterly reporting is required under 10 ILCS 5/9-10(b); large-contribution A-1 and independent-expenditure B-1 reports accelerate to 2 business days near an election."
    - "The bulk files include both electronically filed and paper-entered records; the data dictionary's FiledDocs source field distinguishes them."

status:
