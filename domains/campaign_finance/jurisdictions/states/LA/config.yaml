# Louisiana campaign finance jurisdiction config
# Source: Louisiana Ethics Administration campaign finance bulk exports

jurisdiction:
  name: "Louisiana"
  code: "LA"
  type: "state"
  fips: "22"
  parent: null

data_sources:
  - name: "LA Ethics Campaign Finance — Contributions"
    url: "https://www.ethics.la.gov/CampaignFinanceSearch/ShowPremadereports.aspx"
    bulk_download_url: "https://www.ethics.la.gov/Pub/CampFinan/DataDownload/ContributionReports.zip"
    api_base_url: null
    format: "csv"
    auth_required: false
    update_frequency: "daily"
    coverage:
      start_year: 1995
      covers_sub_jurisdictions: true
      office_levels:
        - governor
        - lieutenant_governor
        - attorney_general
        - state_senate
        - state_house
        - county
        - municipal
      transaction_types:
        - contributions
    field_mappings:
      FilerNumber: "committee.id"
      FilerLastName: "committee.name"
      FilerFirstName: "la.filer_first_name"
      ReportCode: "la.report_code"
      ReportType: "la.report_type"
      ReportNumber: "la.report_number"
      ContributorTypeCode: "donor.type"
      ContributorName: "donor.org_name"
      ContributorAddr1: "donor.address.street1"
      ContributorAddr2: "donor.address.street2"
      ContributorCity: "donor.address.city"
      ContributorrState: "donor.address.state"
      ContributorZip: "donor.address.zip"
      ContributionType: "la.contribution_type"
      ContributionDescription: "transaction.description"
      ContributionDate: "transaction.date"
      ContributionAmt: "transaction.amount"
      ContributionDesignatedElectionAdditionInfo: "la.contribution_designated_election_info"
    scraper: null
    last_successful_pull: null
    last_verified_working: "2026-03-29"
    known_issues:
      - "Contribution ZIP contains date-range member files (for example Contributions_2024_to_2027.csv), not single-year members"
      - "Column name ContributorrState includes a double-r typo in the published export"

