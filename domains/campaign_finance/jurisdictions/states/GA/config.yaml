laws:
  source_url: "https://media.ethics.ga.gov/Commission/pdf/EthicsInGovernmentAct.pdf"
  last_verified: "2026-03-14"
  contribution_limits:
    individual_to_candidate: 8400
    pac_to_candidate: 8400
    corporate_direct: 8400
    union_direct: 8400
    party_to_candidate: 8400
  itemization_threshold: 100
  reporting:
    periods: ["quarterly", "pre-election"]
    electronic_filing_required: "required"
  public_financing: false
  notes:
    - "Commission notice dated 2023-03-27 sets adjusted limits to $8,400 statewide primary/general, $4,800 statewide runoff, $3,300 all-other primary/general, $1,800 all-other runoff (https://ethics.ga.gov/contribution-limits/)."
    - "O.C.G.A. 21-5-41 applies limits to person, corporation, political committee, and political party; unions are not separately enumerated in this limits subsection and are normalized as equivalent donor entities for this flat schema."
    - "21-5-41(j) excludes certain political party spending supporting the party ticket or group of named candidates from contribution-limit accounting."
    - "21-5-41(g) excludes contributions from a candidate to their own campaign and from specific immediate-family relationships from contribution-limit caps."
    - "21-5-41(c) aggregates contributions from affiliated entities under common ownership/control for limit enforcement."
    - "Two-business-day reporting for contributions over $1,000 during the period before election requires separate handling (21-5-34(c)(2))."
    - "Fundraising blackout applies to General Assembly members, statewide elected officers, and related committees during legislative session windows (21-5-35)."
    - "21-5-30 prohibits anonymous contributions and conversion of campaign funds to personal use."
    - "Reporting periods are mapped to quarterly + pre-election: the 2026 Commission filing schedule lists four roughly quarterly CCDR windows plus two-business-day pre-election reporting for contributions over $1,000 (21-5-34(c)(2))."
    - "Commission-published adjusted limits reference the 2023-03-27 vote under 21-5-41(k); monitor for future CPI-driven updates."
    - "Filing cadence changed in 2026 guidance (SB 199 implementation context); re-verify each cycle against both statute and Commission schedule-page updates."

