    api_base_url: null
    format: "web_portal"
    auth_required: false
    update_frequency: "continuous"
    coverage:
      start_year: 2000
      covers_sub_jurisdictions: true
      office_levels:
        - governor
        - lieutenant_governor
        - state_senate
        - state_house
        - judicial
        - county
        - municipal
      transaction_types:
        - contributions
        - loans
    field_mappings:
