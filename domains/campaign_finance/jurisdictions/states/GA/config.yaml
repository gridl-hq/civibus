      Candidate_LastName: "candidate.name.last"
      Candidate_Suffix: "candidate.name.suffix"
      Committee_Name: "committee.name"
    scraper: null
    last_successful_pull: null
    last_verified_working: "2026-03-26"
    known_issues:
      - "Portal requires one persistent ASP.NET browser context per scrape run (ASP.NET_SessionId + __VIEWSTATE + __EVENTVALIDATION)."
      - "Contribution search export returns full matching result sets, not only the visible page, and can take more than 30 seconds for broad queries."
      - "Contribution export is delivered as text/csv attachment StateEthicsReport.csv; some tooling saves the payload with .xls extension."
      - "Raw HTTP clients frequently time out on postback export/pagination flows; Playwright browser automation succeeds when page state is preserved."
      - "No official bulk download, API, or machine-readable feed was found on campaign search surfaces."

