# Florida campaign finance jurisdiction config
# Source: Florida Department of State campaign finance export CGI endpoints

jurisdiction:
  name: "Florida"
  code: "FL"
  type: "state"
  fips: "12"
  parent: null

data_sources:
  - name: "FL DOS Campaign Finance - Contributions"
    url: "https://dos.elections.myflorida.com/campaign-finance/contributions/"
    bulk_download_url: "https://dos.elections.myflorida.com/cgi-bin/contrib.exe"
    api_base_url: null
    format: "csv"
    auth_required: false
    update_frequency: "daily"
    coverage:
      start_year: 2000
      covers_sub_jurisdictions: true
      office_levels:
        - governor
        - lieutenant_governor
        - attorney_general
        - chief_financial_officer
        - commissioner_of_agriculture
        - state_senate
        - state_house
        - county
        - municipal
        - school_district
        - special_district
      transaction_types:
        - contributions
    field_mappings:
      "Candidate/Committee": "committee.name"
      "Date": "transaction.date"
      "Amount": "transaction.amount"
      "Typ": "transaction.type"
      "Contributor Name": "donor.name"
      "Address": "donor.address.street1"
      "City State Zip": "donor.address.city_state_zip"
      "Occupation": "donor.occupation"
      "Inkind Desc": "transaction.in_kind_description"
    scraper: null
    last_successful_pull: null
    last_verified_working: "2026-03-27"
    known_issues:
      - "Source is a form POST export; bulk_download_url stores the full CGI endpoint URL used for POST requests"
      - "Export payload is tab-delimited TSV with CRLF line endings and US-ASCII encoding; schema format remains csv"
      - "Browser-like User-Agent is required or upstream may return Cloudflare 403"
      - "Direct HTTP POST can return Cloudflare-backed 502 HTML even after a successful landing-page GET; downloader falls back to browser-session form submission"
      - "Errors can return HTTP 200 with Content-Type text/html; downloader must validate response Content-Type"
      - "Server truncates silently at rowlimit"

