    field_mappings:
      senator_id: "person.identifiers.fl_senator_id"
      first_name: "person.first_name"
      last_name: "person.last_name"
      district: "electoral_division.district_number"
      status: "officeholding.holder_status_source"
      term_start: "officeholding.term_start_year"
      term_end: "officeholding.term_end_year"
