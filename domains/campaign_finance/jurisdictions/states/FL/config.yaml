laws:
  source_url: "https://www.leg.state.fl.us/statutes/index.cfm?App_mode=Display_Statute&URL=0100-0199/0106/0106.html"
  last_verified: "2026-03-25"
  contribution_limits:
    individual_to_candidate: 1000
    pac_to_candidate: 1000
    corporate_direct: 1000
    union_direct: 1000
    party_to_candidate: 50000
  itemization_threshold: 100
  reporting:
    periods: ["quarterly", "weekly", "daily", "pre-election"]
    electronic_filing_required: "required"
  public_financing: false
  notes:
    - "Section 106.08(1)(a) sets candidate contribution caps at $3,000 for statewide offices and $1,000 for legislative, multicounty, countywide, and sub-county offices; config uses the lower statewide-safe ceiling"
    - "Section 106.08(2) caps aggregate party executive and affiliated party committee contributions at $50,000, with a $250,000 cap for statewide candidates"
    - "Section 106.07 requires quarterly reports plus intensified election-period reporting (weekly and, for division filers, daily windows)"
    - "Section 106.0705 requires electronic filing for entities filing with the Division of Elections"
    - "Chapter 106 does not impose a categorical corporate or labor-union direct-contribution ban; limits apply under the same candidate cap structure"

status:
  discovery: "complete"
