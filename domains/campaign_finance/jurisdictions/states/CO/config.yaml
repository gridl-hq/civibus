# Colorado campaign finance jurisdiction config
# Source: TRACER (Transparency in Contribution and Expenditure Reporting)
# Governing law: Colorado Constitution Article XXVIII + C.R.S. Title 1, Article 45

jurisdiction:
  name: "Colorado"
  code: "CO"
  type: "state"
  fips: "08"
  parent: null

data_sources:
  - name: "TRACER Bulk Download — Contributions"
    url: "https://tracer.sos.colorado.gov/PublicSite/DataDownload.aspx"
    bulk_download_url: "https://tracer.sos.colorado.gov/PublicSite/Docs/BulkDataDownloads/{YEAR}_ContributionData.csv.zip"
    api_base_url: null
    format: "csv"
    auth_required: false
    update_frequency: "weekly"
    coverage:
      start_year: 2000
      covers_sub_jurisdictions: true
      office_levels:
        - governor
        - attorney_general
        - secretary_of_state
        - state_treasurer
        - state_senate
        - state_house
        - district_attorney
        - cu_regent
        - state_board_of_education
        - county
        - municipal
        - school_district
        - rtd
      transaction_types:
        - contributions
    field_mappings:
      CO_ID: "committee.id"
      ContributionAmount: "transaction.amount"
      ContributionDate: "transaction.date"
      LastName: "donor.name.last"
      FirstName: "donor.name.first"
      MI: "donor.name.middle_initial"
      Suffix: "donor.name.suffix"
      Address1: "donor.address.street1"
      Address2: "donor.address.street2"
      City: "donor.address.city"
      State: "donor.address.state"
      Zip: "donor.address.zip"
      Explanation: "transaction.description"
      RecordID: "transaction.id"
      FiledDate: "transaction.filed_date"
      ContributionType: "transaction.type"
      ReceiptType: "transaction.receipt_type"
      ContributorType: "donor.type"
      Electioneering: "transaction.electioneering"
      CommitteeType: "committee.type"
      CommitteeName: "committee.name"
      CandidateName: "candidate.name"
      Employer: "donor.employer"
      Occupation: "donor.occupation"
      Amended: "transaction.amended"
      Amendment: "transaction.is_amendment"
      AmendedRecordID: "transaction.amended_record_id"
      Jurisdiction: "jurisdiction.name"
      OccupationComments: "donor.occupation_comments"
    scraper: null
    last_successful_pull: null
    last_verified_working: "2026-03-26"
    known_issues:
      - "SOS terms prohibit robotic extraction on public pages; bulk downloads via DataDownload.aspx are the compliant access path (see docs/reference/research/data-licensing.md)"
      - "No explicit commercial reuse grant found in TRACER bulk download materials (see docs/reference/research/data-licensing.md)"
      - "ContributionType field embeds LLC total amount in string for LLC contributions (e.g. 'Monetary (Itemized) - LLC Contribution (Total Amount: 500.00)')"
      - "ContributorType field embeds LLC member name in string for LLC member contributions"
      - "Some records in 2025 file have ContributionDate in 2022, indicating late-filed or amended records"
      - "2025 ContributionData has malformed quoted donor names in at least 14 rows (26 columns instead of 29), requiring tolerant CSV parsing and row-level quarantine"

  - name: "TRACER Bulk Download — Expenditures"
    url: "https://tracer.sos.colorado.gov/PublicSite/DataDownload.aspx"
    bulk_download_url: "https://tracer.sos.colorado.gov/PublicSite/Docs/BulkDataDownloads/{YEAR}_ExpenditureData.csv.zip"
    api_base_url: null
    format: "csv"
    auth_required: false
    update_frequency: "weekly"
    coverage:
