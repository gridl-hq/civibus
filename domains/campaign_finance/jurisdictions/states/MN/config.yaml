laws:
  source_url: "https://www.revisor.mn.gov/statutes/cite/10A.27"
  last_verified: "2026-03-21"
  contribution_limits:
    individual_to_candidate: 4000
    pac_to_candidate: 4000
    corporate_direct: "prohibited"
    union_direct: null
    party_to_candidate: 40000
  itemization_threshold: 200
  reporting:
    periods: ["annual", "pre-primary", "pre-general"]
    electronic_filing_required: "required"
  public_financing:
    type: "political_contribution_refund"
    administering_agency: "Minnesota Campaign Finance and Public Disclosure Board"
  notes:
    - "Office-level limits vary under Minn. Stat. 10A.27; listed values use governor-level amounts"
    - "Party-unit limit is 10x the candidate office-level limit under Minn. Stat. 10A.27 subd. 2"
    - "Corporate direct contributions are prohibited under Minn. Stat. 211B.15"
    - "Board guidance: general-purpose committees/funds cannot accept corporate money, while independent-expenditure and ballot-question committees/funds may accept corporate/LLC sources subject to required disclosure rules"
    - "union_direct remains null pending legal review of political-fund treatment"
    - "Reporting cadence varies by filer class and election year under Minn. Stat. 10A.20"

