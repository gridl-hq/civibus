      CVR_CAMPAIGN_DISCLOSURE_CD.FILER_NAMF: "filer.name.first"
      CVR_CAMPAIGN_DISCLOSURE_CD.FILER_NAMT: "filer.name.title"
      CVR_CAMPAIGN_DISCLOSURE_CD.FILER_NAMS: "filer.name.suffix"
      CVR_CAMPAIGN_DISCLOSURE_CD.ENTITY_CD: "filer.entity_type"
      CVR_CAMPAIGN_DISCLOSURE_CD.OFFICE_CD: "jurisdiction.office_code"
      CVR_CAMPAIGN_DISCLOSURE_CD.OFFIC_DSCR: "jurisdiction.office_description"
      CVR_CAMPAIGN_DISCLOSURE_CD.JURIS_CD: "jurisdiction.code"
