laws:
  source_url: "https://www.fppc.ca.gov/learn/campaign-rules.html"
  last_verified: "2026-03-21"
  contribution_limits:
    individual_to_candidate: 5500
    pac_to_candidate: 10200
    corporate_direct: "prohibited"
    union_direct: "prohibited"
    party_to_candidate: null
  itemization_threshold: 100
  reporting:
    periods: ["semi-annual", "pre-election", "quarterly"]
    electronic_filing_required: "required"
  public_financing: false
  notes:
    - "Limits per election (primary/general each); amounts are 2025-2026 cycle per FPPC"
    - "Individual limit to candidate: $5,500 per election (Gov. Code § 85301)"
    - "Small contributor committee to candidate: $10,200 per election (Gov. Code § 85302)"
    - "Corporate and union direct contributions to candidates are prohibited (Gov. Code § 85301)"
    - "No explicit party-to-candidate limit in Political Reform Act; party spending treated differently"
    - "Itemization threshold: name and address required at $100+ (Gov. Code § 84211)"
    - "Electronic filing required via CAL-ACCESS for committees receiving/spending $25,000+ per calendar year"
    - "Semi-annual statements (Jan-Jun, Jul-Dec), plus pre-election statements for primary and general elections"
    - "State-level candidates file with SOS; local candidates file with local filing officers (FPPC campaign-rules)"
    - "Limits adjusted biennially based on CPI; current amounts effective 2025-01-01"
    - "Ballot measure committees have no contribution limits (Gov. Code § 85303)"
    - "Independent expenditure committees must file 24-hour reports for IE over $1,000 within 90 days of election"

