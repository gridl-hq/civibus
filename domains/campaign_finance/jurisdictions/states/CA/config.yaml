# California campaign finance jurisdiction config
# Source: CAL-ACCESS (Secretary of State electronic filing system)
# Governing law: California Political Reform Act (Gov. Code §§ 81000–91014)

jurisdiction:
  name: "California"
  code: "CA"
  type: "state"
  fips: "06"
  parent: null

data_sources:
  - name: "CAL-ACCESS Raw Data Export"
    url: "https://www.sos.ca.gov/campaign-lobbying/cal-access-resources/raw-data-campaign-finance-and-lobbying-activity"
    bulk_download_url: "https://campaignfinance.cdn.sos.ca.gov/dbwebexport.zip"
    api_base_url: null
    format: "csv"
    auth_required: false
    update_frequency: "daily"
    coverage:
      start_year: 1999
      covers_sub_jurisdictions: true
      office_levels:
        - governor
        - lieutenant_governor
        - attorney_general
        - secretary_of_state
        - state_treasurer
        - state_controller
        - insurance_commissioner
        - superintendent_of_public_instruction
        - board_of_equalization
        - state_senate
        - state_assembly
        - county
        - municipal
        - school_district
        - judicial
        - special_district
      transaction_types:
        - contributions
        - expenditures
        - loans
