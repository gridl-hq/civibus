      CVR_CAMPAIGN_DISCLOSURE_CD.STMT_TYPE: "filing.statement_type"
      # RCPT_CD — contribution/receipt transactions
      RCPT_CD.FILING_ID: "filing.id"
      RCPT_CD.AMEND_ID: "filing.amendment_id"
      RCPT_CD.TRAN_ID: "transaction.id"
      RCPT_CD.ENTITY_CD: "donor.entity_type"
      RCPT_CD.CTRIB_NAML: "donor.name.last"
      RCPT_CD.CTRIB_NAMF: "donor.name.first"
