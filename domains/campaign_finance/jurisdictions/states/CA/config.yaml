    last_successful_pull: null
    last_verified_working: "2026-03-26"
    known_issues:
      - "ZIP archive is very large (~1.5 GB compressed); RCPT_CD and EXPN_CD report uncomp_size=4294967295 in central directory, requiring ZIP64 handling"
      - "Legacy/outlier dates present: 0200, 1899, 1982 in CVR_CAMPAIGN_DISCLOSURE_CD RPT_DATE; isolated 1970 in sampled EXPN_CD EXPN_DATE"
      - "Inconsistent jurisdiction and office descriptors across rows; OFFICE_CD and JURIS_CD values vary between state and local filers"
      - "Loan transactions include pre-2000 legacy dates (at least 1990 in full LOAN_CD scan); coverage.start_year reflects campaign disclosure baseline (1999) not loan date floor"
      - "Documentation set is legacy-dated (start-here.htm Last Updated 10/14/2013); table semantics must be validated against live data"
      - "Tab-delimited TSV format despite format field showing csv; actual delimiter is tab character"

