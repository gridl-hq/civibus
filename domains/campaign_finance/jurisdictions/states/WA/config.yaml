laws:
  source_url: "https://app.leg.wa.gov/RCW/default.aspx?cite=42.17A.405"
  last_verified: "2026-03-21"
  contribution_limits:
    individual_to_candidate: null
    pac_to_candidate: null
    corporate_direct: "prohibited"
    union_direct: null
    party_to_candidate: null
  itemization_threshold: 25
  reporting:
    periods: ["monthly", "pre-election", "post-election"]
    electronic_filing_required: "required"
  public_financing: false
  notes:
    - "RCW contribution-limit values vary by office class and election context; config keeps flattened placeholders with narrative caveats"
    - "RCW 42.56.070(9) and AGO 1975 No. 15 are cited in PDC dataset release conditions for non-commercial reuse limits"
    - "RCW chapter headings indicate recodification from 42.17A to 29B as of 2026; citations should be re-verified during updates"
    - "State and local office classes are both covered by WA campaign-finance law definitions"

