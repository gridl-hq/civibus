laws:
  source_url: "https://www.pa.gov/agencies/dos/programs/voting-and-elections/campaign-finance"
  last_verified: "2026-03-21"
  contribution_limits:
    individual_to_candidate: "unlimited"
    pac_to_candidate: "unlimited"
    corporate_direct: "prohibited"
    union_direct: "prohibited"
    party_to_candidate: "unlimited"
  itemization_threshold: 50
  reporting:
    periods: ["annual", "pre-primary", "post-primary", "pre-election", "post-election", "24-hour"]
    electronic_filing_required: "not_required"
  public_financing: false
  notes:
    - "PA DOS Campaign Finance FAQ states there is no dollar limit for individual contributions, but cash contributions over $100 are not allowed"
    - "PA DOS Campaign Finance FAQ states corporations and labor unions (unincorporated associations) cannot make contributions or expenditures to candidates or political committees"
    - "PA DOS reporting guidance requires multiple periodic reports and 24-hour reporting for contributions or independent expenditures of $500 or more after the final pre-election or pre-primary report"
    - "PA DOS reporting guidance lists late fee penalties as $20/day for first six days, then $10/day, capped at $250"

