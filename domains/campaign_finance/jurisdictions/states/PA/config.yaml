      - "update_frequency changed to weekly (2026-03-28): despite URL labeling as 'annual', current-year ZIPs are regenerated roughly weekly with ~4 day lag from latest filing. 2026.zip Last-Modified: 2026-03-23, contains data through SubmittedDate 2026-03-19. All reporting cycles (pre-primary, pre-election, 24-hour, etc.) are included as filed, not batched annually."
