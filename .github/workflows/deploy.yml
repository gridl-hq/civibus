name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: deploy
    if: github.repository == 'gridl-hq/civibus'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      PROD_SMOKE_BASE_URL: ${{ vars.PROD_SMOKE_BASE_URL }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy API to Fly
        shell: bash
        run: |
          set -euo pipefail
          flyctl deploy -c infra/fly/api.fly.toml --remote-only

      - name: Deploy web to Fly
        shell: bash
        run: |
          set -euo pipefail
          flyctl deploy web -c infra/fly/web.fly.toml --remote-only

      - name: Deploy Caddy to Fly
        shell: bash
        run: |
          set -euo pipefail
          flyctl deploy -c infra/fly/caddy.fly.toml --remote-only

      - name: Run production smoke gate
        shell: bash
        working-directory: web
        run: |
          set -euo pipefail
          if [[ -z "${PROD_SMOKE_BASE_URL}" ]]; then
            echo "Deploy workflow requires PROD_SMOKE_BASE_URL Actions variable for production smoke mode" >&2
            exit 1
          fi
          SMOKE_MODE=production SMOKE_BASE_URL="${PROD_SMOKE_BASE_URL}" \
            bash ./tests/smoke/run-playwright.sh -- tests/smoke/production_deploy.spec.ts --reporter=line
