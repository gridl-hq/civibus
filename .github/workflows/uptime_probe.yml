name: Uptime probe — /api/health/content

# External-infrastructure verifier. Hits ${{ env.PROBE_BASE_URL }}/api/health/content
# every 5 minutes and opens / comments-on / closes a GitHub issue with
# the `uptime-incident` label based on the response.
#
# Anchored postmortem: docs/howto/operations/postmortems/2026_04_30_prod_data_link_severed.md
# Apr 30 incident hid for 16h because every observer ran on or near the
# prod VM. This workflow is structurally outside that loop — it runs on
# GitHub's infrastructure, not Hetzner — so when the prod stack is
# broken, *something on different infrastructure* still notices.
#
# Sync flow: dev repo (gridl-dev/civibus_dev) has Actions disabled, so
# this file does not execute here. debbie syncs it to staging + prod
# public repos where it does execute.

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      probe_url_override:
        description: Full one-run probe URL override for manual drills
        required: false
        default: ""
        type: string

env:
  PROBE_BASE_URL: https://civibus.shareborough.com

permissions:
  contents: read
  issues: write

jobs:
  probe:
    name: probe
    runs-on: ubuntu-latest
    steps:
      - name: Probe content health endpoint
        id: probe
        env:
          PROBE_URL_OVERRIDE: ${{ github.event.inputs.probe_url_override }}
        run: |
          set +e
          TARGET="${PROBE_URL_OVERRIDE:-${PROBE_BASE_URL}/api/health/content}"
          STATUS=$(curl -sS "$TARGET" \
            --max-time 30 \
            --write-out '%{http_code}' \
            --output /tmp/body.json)
          CURL_EXIT=$?
          set -e

          # Healthiness logic:
          #   - curl error (timeout, connection refused) => unhealthy
          #   - HTTP 200 + body.healthy == true        => healthy
          #   - anything else                          => unhealthy
          HEALTHY=false
          DETAIL=""
          if [ "$CURL_EXIT" -ne 0 ]; then
            DETAIL="curl exit $CURL_EXIT (timeout, connection refused, or DNS failure)"
          elif [ "$STATUS" = "200" ]; then
            if jq -e '.healthy == true' /tmp/body.json > /dev/null 2>&1; then
              HEALTHY=true
            else
              BODY_EXCERPT=$(jq -c . /tmp/body.json 2>/dev/null | head -c 500 || head -c 500 /tmp/body.json)
              DETAIL="HTTP 200 but body.healthy not true: ${BODY_EXCERPT}"
            fi
          else
            BODY_EXCERPT=$(head -c 500 /tmp/body.json 2>/dev/null || true)
            DETAIL="HTTP ${STATUS} body=${BODY_EXCERPT}"
          fi

          echo "healthy=${HEALTHY}" >> "$GITHUB_OUTPUT"
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"
          echo "target=${TARGET}" >> "$GITHUB_OUTPUT"
          # Multi-line-safe output for DETAIL (may contain JSON / newlines).
          {
            echo "detail<<DETAIL_DELIMITER_$$"
            echo "${DETAIL}"
            echo "DETAIL_DELIMITER_$$"
          } >> "$GITHUB_OUTPUT"
          echo "Probe result: healthy=${HEALTHY} status=${STATUS}"

      - name: Warn on public deploy drift
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # WARN-only shadow mode. This mirror-side check detects deploy lag
          # (public host not serving the latest synced mirror commit) but cannot
          # detect sync lag (gridl-dev/civibus_dev main ahead of the mirror).
          # Promote this check to fail-closed only after one batch with zero false would-be kills cited in closing evidence.
          manifest_json="$(
            gh api repos/${{ github.repository }}/contents/.debbie/sync_manifest.json --jq '.content' | base64 -d
          )"
          expected_sha="$(printf '%s' "$manifest_json" | jq -r '.dev_sha // empty')"
          api_sha="$(curl -fsS "${PROBE_BASE_URL%/}/api/health/version" | jq -r '.git_sha // "unknown"' || true)"
          web_sha="$(curl -fsS "${PROBE_BASE_URL%/}/version.json" | jq -r '.git_sha // "unknown"' || true)"

          if [[ ! "$expected_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::warning::deploy lag check could not read a valid dev_sha from the mirror sync manifest"
            exit 1
          fi

          if [[ "$api_sha" == "$expected_sha" && "$web_sha" == "$expected_sha" ]]; then
            echo "deploy_drift_ok expected=$expected_sha api=$api_sha web=$web_sha"
            exit 0
          fi

          echo "::warning::deploy lag detected for ${PROBE_BASE_URL}: expected=$expected_sha api=$api_sha web=$web_sha. This mirror-side warning cannot detect sync lag; the dev-repo parity probe owns that."
          exit 1

      - name: Find existing open uptime-incident issue
        id: find
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NUMBER=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label uptime-incident \
            --state open \
            --json number \
            --limit 1 \
            --jq '.[0].number // empty')
          echo "number=${NUMBER}" >> "$GITHUB_OUTPUT"
          echo "Existing open uptime-incident issue: ${NUMBER:-none}"

      - name: Close existing issue (endpoint recovered)
        if: steps.probe.outputs.healthy == 'true' && steps.find.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          gh issue comment "${{ steps.find.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --body "Probe at ${NOW} returned 200 healthy. Endpoint recovered. Closing."
          gh issue close "${{ steps.find.outputs.number }}" \
            --repo "${{ github.repository }}"

      - name: Comment on existing issue (endpoint still failing)
        if: steps.probe.outputs.healthy == 'false' && steps.find.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROBE_DETAIL: ${{ steps.probe.outputs.detail }}
          PROBE_STATUS: ${{ steps.probe.outputs.status }}
        run: |
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          DETAIL="${PROBE_DETAIL}"
          STATUS="${PROBE_STATUS}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh issue comment "${{ steps.find.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --body "Probe at ${NOW} — still failing. Status: ${STATUS}. Detail: ${DETAIL}. Run: ${RUN_URL}"

      - name: Open new uptime-incident issue (endpoint failing, no existing issue)
        if: steps.probe.outputs.healthy == 'false' && steps.find.outputs.number == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROBE_DETAIL: ${{ steps.probe.outputs.detail }}
          PROBE_STATUS: ${{ steps.probe.outputs.status }}
          PROBE_TARGET: ${{ steps.probe.outputs.target }}
        run: |
          # Idempotent label create. --force lets us update the color/description
          # without erroring if the label already exists.
          gh label create uptime-incident \
            --repo="${{ github.repository }}" \
            --color FF6B6B \
            --description "${{ env.PROBE_BASE_URL }} uptime probe failure" \
            --force 2>/dev/null || true

          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          STATUS="${PROBE_STATUS}"
          DETAIL="${PROBE_DETAIL}"
          TARGET="${PROBE_TARGET}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          BODY="The ${{ env.PROBE_BASE_URL }} content health probe failed.

          **Status:** ${STATUS}
          **Detail:** ${DETAIL}
          **Probe time:** ${NOW}
          **Workflow run:** ${RUN_URL}

          This issue was auto-created by .github/workflows/uptime_probe.yml.
          Subsequent failures will comment here (not open new issues). The
          workflow will auto-close this issue when the endpoint returns 200
          healthy again.

          - Endpoint: ${TARGET}
          - Owner: api/health_content.py + api/main.py:186
          - Anchored postmortem: docs/howto/operations/postmortems/2026_04_30_prod_data_link_severed.md"

          gh issue create \
            --repo "${{ github.repository }}" \
            --label uptime-incident \
            --title "[uptime] /api/health/content returned ${STATUS} at ${NOW}" \
            --body "${BODY}"

      # The job ALWAYS exits 0. The issue is the alert; a non-zero job exit
      # would create a second notification path (workflow-failed email)
      # and risk masking real failures behind workflow-noise emails.
