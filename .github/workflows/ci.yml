name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync --locked --extra dev
      - name: Ruff check
        run: uv run --locked ruff check .
      - name: Ruff format check
        run: uv run --locked ruff format --check .

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync --locked --extra dev --extra entity-resolution
      - name: Unit tests
        run: uv run --locked pytest -m "not integration and not e2e" --tb=short --cov=api --cov=core --cov=domains --cov-fail-under=70
